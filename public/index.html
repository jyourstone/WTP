<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>WTP</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/calendar.css">
  <link rel="stylesheet" href="/css/modal.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <img class="header__logo" src="/icons/logo_no_bg.png" alt="Logo" width="28" height="28">
      <div class="header__nav">
        <button class="header__btn" id="btn-prev" aria-label="Föregående">&lsaquo;</button>
        <h1 class="header__title" id="header-title"></h1>
        <button class="header__btn" id="btn-next" aria-label="Nästa">&rsaquo;</button>
      </div>
      <div class="header__actions">
        <button class="header__today-btn" id="btn-today">Idag</button>
        <div class="header__view-toggle">
          <button class="view-btn view-btn--active" id="btn-month" data-view="month">Månad</button>
          <button class="view-btn" id="btn-week" data-view="week">Vecka</button>
        </div>
        <button class="header__icon-btn" id="btn-categories" aria-label="Kategorier">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <main class="main">
      <div class="calendar" id="calendar"></div>
    </main>

    <section class="summary" id="summary">
      <button class="summary__toggle" id="summary-toggle">
        <span>Sammanfattning</span>
        <svg class="summary__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="summary__content" id="summary-content"></div>
    </section>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <button class="modal__close" id="modal-close" aria-label="Stäng">&times;</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
